<!-- Toast Notification Container -->
<div id="toast-container" class="toast-container"></div>

<!-- Custom Confirm Modal -->
<div id="custom-confirm-modal" class="modal" style="display: none; position: fixed; z-index: 10001; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); align-items: center; justify-content: center;">
    <div class="modal-content" style="background-color: var(--card-bg); margin: auto; padding: 20px; border: 1px solid var(--border-color); width: 90%; max-width: 400px; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
        <h3 id="custom-confirm-title" style="margin-top: 0; color: var(--text-primary);">¿Estás seguro?</h3>
        <p id="custom-confirm-message" style="color: var(--text-secondary); margin-bottom: 25px;">Esta acción no se puede deshacer.</p>
        <div style="display: flex; gap: 15px; justify-content: center;">
            <button id="custom-confirm-cancel" class="btn-secundario" style="flex: 1;">Cancelar</button>
            <button id="custom-confirm-ok" class="btn-primary" style="flex: 1;">Aceptar</button>
        </div>
    </div>
</div>
