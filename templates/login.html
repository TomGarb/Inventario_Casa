{% extends "base.html" %}
{% set active_page = 'login' %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Iniciar Sesión</h2>
        <form class="auth-form" method="POST" action="{{ url_for('login_page') }}">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" class="form-control" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <div style="position: relative;">
                    <input type="password" id="password" name="password" class="form-control" required autocomplete="current-password" style="padding-right: 40px;">
                    <button type="button" onclick="togglePassword('password')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.2rem; margin-top: 2px;">👁️</button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px;">Ingresar</button>
        </form>
        <p style="margin-top: 15px; text-align: center; color: var(--text-color);">
            ¿No tienes cuenta? <a href="{{ url_for('register_page') }}" style="color: var(--primary-color);">Regístrate aquí</a>
        </p>
    </div>
</div>

<script>
function togglePassword(inputId) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') {
        input.type = 'text';
    } else {
        input.type = 'password';
    }
}
</script>
{% endblock %}
